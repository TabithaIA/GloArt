<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GloArt</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #0d0d0f;
            color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background-color: #09090b;
        }
        
        canvas#mural {
            position: absolute;
            background-color: #ffffff;
            box-shadow: 0 25px 60px rgba(0,0,0,0.75);
            transform-origin: 0 0;
        }

        /* --- INTERFAZ COMPACTA ESTILO PROCREATE --- */
        
        #top-bar {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 1200px;
            height: 36px;
            background: rgba(24, 24, 26, 0.82);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            z-index: 100;
        }

        .bar-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: #a1a1aa;
            font-size: 14px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { color: #ffffff; background: rgba(255,255,255,0.05); }
        .icon-btn.active { color: #30d158; background: rgba(48, 209, 88, 0.12); }
        .icon-btn:disabled { color: #3a3a3c; }

        .divider {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.1);
        }

        #colorPreview {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid #ffffff;
            box-shadow: 0 0 6px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.1s;
        }
        #colorPreview:active { transform: scale(0.9); }

        /* PANEL FLOTANTE COMÚN */
        .dropdown-panel {
            display: none;
            position: absolute;
            top: 48px;
            background: #18181a;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 200;
            flex-direction: column;
            gap: 8px;
        }
        .dropdown-panel.show { display: flex; }

        #wheelContainer { right: 12px; align-items: center; }

        /* CONTENEDOR DE CAPAS */
        #layersContainer {
            right: 45px;
            width: 140px;
        }
        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: background 0.2s;
        }
        .layer-item:hover { background: rgba(255,255,255,0.08); }
        .layer-item.active {
            border-color: #30d158;
            background: rgba(48, 209, 88, 0.1);
            color: #30d158;
        }

        #sidebar-controls {
            position: absolute;
            left: 14px;
            top: 55%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 22px;
            align-items: center;
            z-index: 100;
            background: rgba(24, 24, 26, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 14px 6px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            height: 100px;
            width: 20px;
        }

        .vertical-slider {
            -webkit-appearance: none;
            transform: rotate(-90deg);
            width: 100px;
            height: 3px;
            background: #2c2c2e;
            border-radius: 1.5px;
            position: absolute;
            top: 48px;
            cursor: pointer;
        }
        .vertical-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f2f2f7;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }

        .slider-label {
            font-size: 7.5px;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: absolute;
            bottom: -14px;
            white-space: nowrap;
        }

        .val-indicator {
            font-size: 8px;
            color: #a1a1aa;
            position: absolute;
            top: -14px;
            font-variant-numeric: tabular-nums;
        }

        #fileInput { display: none; }

        #status-bar {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 9px;
            color: #52525b;
            pointer-events: none;
            z-index: 100;
        }

        /* --- VENTANA DE REFERENCIA FLOTANTE --- */
        #reference-window {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            width: 220px;
            background: #18181a;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 300;
            overflow: hidden;
            flex-direction: column;
            touch-action: none;
        }
        #reference-window.show { display: flex; }
        
        #reference-header {
            background: #242426;
            padding: 6px 10px;
            font-size: 11px;
            color: #a1a1aa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        #reference-close {
            background: transparent;
            border: none;
            color: #ff453a;
            cursor: pointer;
            font-size: 12px;
        }

        #reference-content {
            width: 100%;
            padding: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #09090b;
        }

        #reference-img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 6px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="bar-group">
            <button id="btn-undo" class="icon-btn" title="Deshacer">⤺</button>
            <button id="btn-redo" class="icon-btn" title="Rehacer">⤻</button>
            <button id="btn-clear" class="icon-btn" style="color: #ff453a;" title="Limpiar lienzo">🗑️</button>
        </div>

        <div class="bar-group">
            <button id="btn-draw" class="icon-btn active" title="Pincel">✏️</button>
            <button id="btn-eraser" class="icon-btn" title="Goma de borrar">🧽</button>
            <button id="btn-pan" class="icon-btn" title="Mover Lienzo">🖐️</button>
            <div class="divider"></div>
            <label for="fileInput" class="icon-btn" title="Insertar Imagen de Referencia" style="cursor:pointer;">🖼️</label>
            <input type="file" id="fileInput" accept="image/*">
            <button id="btn-reset-view" class="icon-btn" title="Centrar Lienzo">🏠</button>
            <button id="btn-layers" class="icon-btn" title="Capas">📑</button>
            <div class="divider"></div>
            <div id="colorPreview" style="background-color: #ff4a5a;"></div>
        </div>
    </div>

    <div id="reference-window">
        <div id="reference-header">
            <span>Referencia</span>
            <button id="reference-close">✕</button>
        </div>
        <div id="reference-content">
            <img id="reference-img" src="" alt="Referencia">
        </div>
    </div>

    <div id="wheelContainer" class="dropdown-panel">
        <canvas id="colorWheel" width="110" height="110"></canvas>
        <input type="range" id="brightnessSlider" style="width: 100%; height: 3px;" min="0" max="100" value="50">
    </div>

    <div id="layersContainer" class="dropdown-panel">
        <div class="layer-item" data-layer="3">Capa Arriba</div>
        <div class="layer-item" data-layer="2">Capa Centro</div>
        <div class="layer-item active" data-layer="1">Capa Abajo (Base)</div>
    </div>

    <div id="sidebar-controls">
        <div class="slider-wrapper">
            <span id="sizeVal" class="val-indicator">15px</span>
            <input type="range" id="brushSize" class="vertical-slider" min="1" max="150" value="15">
            <div class="slider-label">Tamaño</div>
        </div>
        <div style="height: 6px;"></div>
        <div class="slider-wrapper">
            <span id="opacityVal" class="val-indicator">100%</span>
            <input type="range" id="brushOpacity" class="vertical-slider" min="10" max="100" value="100">
            <div class="slider-label">Opacidad</div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="mural" width="3000" height="3000"></canvas>
    </div>

    <div id="status-bar">Lienzo 3000 × 3000</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfPCwIoohEB9jPvsv9A8plz-FcbSUV_bY",
            authDomain: "kofykoivk.firebaseapp.com",
            databaseURL: "https://kofykoivk-default-rtdb.firebaseio.com",
            projectId: "kofykoivk",
            storageBucket: "kofykoivk.firebasestorage.app",
            messagingSenderId: "787535249742",
            appId: "1:787535249742:web:b310d356841e2d52421e1f",
            measurementId: "G-1VJ9FNMF72"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const linesRef = ref(db, 'mural_elements');

        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('mural');
        const ctx = canvas.getContext('2d');
        
        let currentMode = 'draw'; 
        let isDrawing = false;
        let isPanning = false;
        let currentColor = '#ff4a5a';
        let currentSize = 15;
        let currentOpacity = 1;
        let currentLayer = 1; 

        let scale = 0.4; 
        let panX = (window.innerWidth - canvas.width * scale) / 2;
        let panY = (window.innerHeight - canvas.height * scale) / 2;
        
        let startX, startY;
        let touchStartDist = 0;
        let startScale = 1;

        let activePointers = [];
        
        let myLastKeys = [];    
        let redoStack = [];     
        let allElements = {};   
        let currentPathPoints = []; 

        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        updateTransform();

        const btnDraw = document.getElementById('btn-draw');
        const btnEraser = document.getElementById('btn-eraser');
        const btnPan = document.getElementById('btn-pan');
        const brushSizeInput = document.getElementById('brushSize');
        const brushOpacityInput = document.getElementById('brushOpacity');
        const sizeVal = document.getElementById('sizeVal');
        const opacityVal = document.getElementById('opacityVal');
        const fileInput = document.getElementById('fileInput');

        function setMode(mode) {
            currentMode = mode;
            [btnDraw, btnEraser, btnPan].forEach(b => b.classList.remove('active'));
            if(mode === 'draw') btnDraw.classList.add('active');
            if(mode === 'eraser') btnEraser.classList.add('active');
            if(mode === 'pan') btnPan.classList.add('active');
        }

        btnDraw.addEventListener('click', () => setMode('draw'));
        btnEraser.addEventListener('click', () => setMode('eraser'));
        btnPan.addEventListener('click', () => setMode('pan'));
        
        brushSizeInput.addEventListener('input', (e) => {
            currentSize = parseInt(e.target.value);
            sizeVal.textContent = currentSize + 'px';
        });
        
        brushOpacityInput.addEventListener('input', (e) => {
            currentOpacity = parseInt(e.target.value) / 100;
            opacityVal.textContent = e.target.value + '%';
        });

        document.getElementById('btn-reset-view').addEventListener('click', () => {
            scale = 0.4;
            panX = (window.innerWidth - canvas.width * scale) / 2;
            panY = (window.innerHeight - canvas.height * scale) / 2;
            updateTransform();
        });

        const colorPreview = document.getElementById('colorPreview');
        const wheelContainer = document.getElementById('wheelContainer');
        const btnLayers = document.getElementById('btn-layers');
        const layersContainer = document.getElementById('layersContainer');

        colorPreview.addEventListener('pointerdown', (e) => { 
            e.stopPropagation(); 
            layersContainer.classList.remove('show');
            wheelContainer.classList.toggle('show'); 
        });

        btnLayers.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            wheelContainer.classList.remove('show');
            layersContainer.classList.toggle('show');
        });

        document.addEventListener('pointerdown', (e) => {
            if (!wheelContainer.contains(e.target) && e.target !== colorPreview) wheelContainer.classList.remove('show');
            if (!layersContainer.contains(e.target) && !btnLayers.contains(e.target)) layersContainer.classList.remove('show');
        });

        document.querySelectorAll('.layer-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.layer-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentLayer = parseInt(item.getAttribute('data-layer'));
            });
        });

        // --- RUEDA DE COLORES MEJORADA ---
        const colorWheel = document.getElementById('colorWheel');
        const wheelCtx = colorWheel.getContext('2d');
        const brightnessSlider = document.getElementById('brightnessSlider');
        let currentHue = 0, currentSat = 100;

        function drawColorWheel() {
            const radius = colorWheel.width / 2;
            const brightness = brightnessSlider.value / 100; 
            wheelCtx.clearRect(0,0,colorWheel.width,colorWheel.height);
            for (let y = 0; y < colorWheel.height; y++) {
                for (let x = 0; x < colorWheel.width; x++) {
                    const dx = x - radius, dy = y - radius;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance <= radius) {
                        let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                        if (angle < 0) angle += 360;
                        const sat = (distance / radius) * 100;
                        let lightness = brightness * 100; 
                        wheelCtx.fillStyle = `hsl(${angle}, ${sat}%, ${lightness}%)`;
                        wheelCtx.fillRect(x, y, 1, 1);
                    }
                }
            }
        }
        drawColorWheel();
        brightnessSlider.addEventListener('input', () => { drawColorWheel(); updateColor(); });
        
        colorWheel.addEventListener('pointerdown', (e) => {
            const rect = colorWheel.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const radius = colorWheel.width / 2;
            const dx = x - radius, dy = y - radius;
            if (Math.sqrt(dx*dx + dy*dy) <= radius) {
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                currentHue = angle < 0 ? angle + 360 : angle;
                currentSat = (Math.sqrt(dx*dx + dy*dy) / radius) * 100;
                updateColor();
            }
        });

        function updateColor() {
            currentColor = `hsl(${currentHue}, ${currentSat}%, ${brightnessSlider.value}%)`;
            colorPreview.style.backgroundColor = currentColor;
        }

        function updateTransform() { canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const mouseX = e.clientX - container.getBoundingClientRect().left;
            const mouseY = e.clientY - container.getBoundingClientRect().top;
            const canvasX = (mouseX - panX) / scale, canvasY = (mouseY - panY) / scale;
            if (e.deltaY < 0) scale *= 1.15; else scale /= 1.15;
            scale = Math.max(0.05, Math.min(scale, 8));
            panX = mouseX - canvasX * scale;
            panY = mouseY - canvasY * scale;
            updateTransform();
        }, { passive: false });

        function getEventCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) / scale, y: (e.clientY - rect.top) / scale };
        }

        container.addEventListener('pointerdown', (e) => {
            if(e.clientY < 52 || (e.clientX < 70 && e.clientY > window.innerHeight/2 - 120 && e.clientY < window.innerHeight/2 + 120)) return;
            if (refWindow.contains(e.target)) return;

            activePointers.push(e);

            if (activePointers.length === 2) {
                isDrawing = false;
                isPanning = true;
                const p1 = activePointers[0];
                const p2 = activePointers[1];
                touchStartDist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                startScale = scale;
                startX = ((p1.clientX + p2.clientX) / 2) - panX;
                startY = ((p1.clientY + p2.clientY) / 2) - panY;
                return;
            }

            if (activePointers.length === 1) {
                if (e.button === 2 || currentMode === 'pan') {
                    isPanning = true;
                    startX = e.clientX - panX; startY = e.clientY - panY;
                    return;
                }
                if ((e.button === 0 || e.pointerType === 'touch') && (currentMode === 'draw' || currentMode === 'eraser')) {
                    isDrawing = true;
                    const pt = getEventCoords(e);
                    currentPathPoints = [pt]; 
                }
            }
        });

        container.addEventListener('pointermove', (e) => {
            const index = activePointers.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) activePointers[index] = e;

            if (activePointers.length === 2) {
                const p1 = activePointers[0];
                const p2 = activePointers[1];
                const dist = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                scale = Math.max(0.05, Math.min((dist / touchStartDist) * startScale, 8));
                const midX = (p1.clientX + p2.clientX) / 2;
                const midY = (p1.clientY + p2.clientY) / 2;
                panX = midX - startX * (scale / startScale);
                panY = midY - startY * (scale / startScale);
                updateTransform();
                return;
            }

            if (isPanning && activePointers.length === 1) {
                panX = e.clientX - startX; 
                panY = e.clientY - startY;
                updateTransform();
                return;
            }

            if (isDrawing && activePointers.length === 1) {
                const pt = getEventCoords(e);
                currentPathPoints.push(pt);
                
                redrawEverything();
                
                if (currentMode === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.globalAlpha = currentOpacity;
                    drawSmoothPath(currentPathPoints, 'rgba(0,0,0,1)', currentSize);
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = currentOpacity;
                    drawSmoothPath(currentPathPoints, currentColor, currentSize);
                }
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
            }
        });

        const handlePointerUp = (e) => {
            if (isDrawing && currentPathPoints.length > 0) {
                const elementData = {
                    type: currentMode === 'eraser' ? 'eraser' : 'path',
                    points: currentPathPoints,
                    color: currentMode === 'eraser' ? null : currentColor,
                    size: currentSize,
                    opacity: currentOpacity,
                    layer: currentLayer 
                };
                
                const newElementRef = push(linesRef, elementData);
                myLastKeys.push(newElementRef.key);
                redoStack = []; 
                currentPathPoints = [];
            }

            activePointers = activePointers.filter(p => p.pointerId !== e.pointerId);
            if (activePointers.length < 2) isPanning = false;
            if (activePointers.length === 0) isDrawing = false;
        };

        window.addEventListener('pointerup', handlePointerUp);
        window.addEventListener('pointercancel', handlePointerUp);
        container.addEventListener('contextmenu', e => e.preventDefault());

        function drawSmoothPath(points, color, size) {
            if (points.length === 0) return;
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = size;

            if (points.length < 3) {
                ctx.arc(points[0].x, points[0].y, size / 2, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                return;
            }

            ctx.moveTo(points[0].x, points[0].y);
            
            for (let i = 1; i < points.length - 1; i++) {
                const xc = (points[i].x + points[i+1].x) / 2;
                const yc = (points[i].y + points[i+1].y) / 2;
                ctx.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
            }
            
            ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
            ctx.stroke();
        }

        function drawSingleElement(data) {
            if (data.type === 'path' && data.points) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = data.opacity !== undefined ? data.opacity : 1;
                drawSmoothPath(data.points, data.color, data.size);
                ctx.globalAlpha = 1;
            } else if (data.type === 'eraser' && data.points) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.globalAlpha = data.opacity !== undefined ? data.opacity : 1;
                drawSmoothPath(data.points, 'rgba(0,0,0,1)', data.size);
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
            }
        }

        function redrawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const elementsArray = Object.values(allElements);
            
            elementsArray.sort((a, b) => {
                const layerA = a.layer || 1;
                const layerB = b.layer || 1;
                return layerA - layerB;
            });

            elementsArray.forEach(element => {
                drawSingleElement(element);
            });
        }

        document.getElementById('btn-undo').addEventListener('click', () => {
            if (myLastKeys.length === 0) return;
            const keyToUndo = myLastKeys.pop();
            const backupData = allElements[keyToUndo];
            if (backupData) {
                redoStack.push({ key: keyToUndo, data: backupData });
                remove(ref(db, `mural_elements/${keyToUndo}`));
            }
        });

        document.getElementById('btn-redo').addEventListener('click', () => {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            set(ref(db, `mural_elements/${action.key}`), action.data);
            myLastKeys.push(action.key);
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            if (confirm("¿Quieres eliminar de forma permanente todo el lienzo?")) {
                remove(linesRef);
                redoStack = []; myLastKeys = [];
            }
        });

        onChildAdded(linesRef, (snapshot) => {
            allElements[snapshot.key] = snapshot.val();
            redrawEverything();
        });

        onChildRemoved(linesRef, (snapshot) => {
            delete allElements[snapshot.key];
            redrawEverything();
        });

        // --- LÓGICA DE VENTANA DE REFERENCIA Y LOCALSTORAGE ---
        const refWindow = document.getElementById('reference-window');
        const refHeader = document.getElementById('reference-header');
        const refImg = document.getElementById('reference-img');
        const refClose = document.getElementById('reference-close');

        let isDraggingRef = false;
        let refOffsetX = 0;
        let refOffsetY = 0;

        // Cargar imagen guardada localmente si existe
        const savedImg = localStorage.getItem('gloart_ref_img');
        if (savedImg) {
            refImg.src = savedImg;
            refWindow.classList.add('show');
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Data = event.target.result;
                refImg.src = base64Data;
                refWindow.classList.add('show');
                try {
                    localStorage.setItem('gloart_ref_img', base64Data);
                } catch(e) {
                    console.warn("La imagen es demasiado grande para el localStorage.");
                }
            };
            reader.readAsDataURL(file);
        });

        refClose.addEventListener('click', () => {
            refWindow.classList.remove('show');
            refImg.src = "";
            localStorage.removeItem('gloart_ref_img');
        });

        refHeader.addEventListener('pointerdown', (e) => {
            isDraggingRef = true;
            const rect = refWindow.getBoundingClientRect();
            refOffsetX = e.clientX - rect.left;
            refOffsetY = e.clientY - rect.top;
            refHeader.setPointerCapture(e.pointerId);
        });

        refHeader.addEventListener('pointermove', (e) => {
            if (!isDraggingRef) return;
            let targetX = e.clientX - refOffsetX;
            let targetY = e.clientY - refOffsetY;
            
            // Bordes simples de la pantalla
            targetX = Math.max(0, Math.min(targetX, window.innerWidth - refWindow.offsetWidth));
            targetY = Math.max(0, Math.min(targetY, window.innerHeight - refWindow.offsetHeight));
            
            refWindow.style.left = targetX + 'px';
            refWindow.style.top = targetY + 'px';
        });

        const stopRefDrag = (e) => {
            if (isDraggingRef) {
                isDraggingRef = false;
                refHeader.releasePointerCapture(e.pointerId);
            }
        };
        refHeader.addEventListener('pointerup', stopRefDrag);
        refHeader.addEventListener('pointercancel', stopRefDrag);
    </script>
</body>
</html>
