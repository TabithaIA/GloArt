<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GloArt - Entrar a una Sala</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #0d0d0f;
            color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .login-container {
            background: rgba(24, 24, 26, 0.82);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 13px;
            color: #a1a1aa;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #09090b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #30d158;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #30d158;
            border: none;
            border-radius: 8px;
            color: #000000;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>GloArt</h1>
        <p>Introduce el código de la sala para empezar a dibujar en equipo.</p>
        
        <input type="text" id="roomCode" placeholder="Ej: MI-SALA-123" spellcheck="false" autocomplete="off">
        <button id="btnEnter">Entrar al Lienzo</button>
    </div>

    <script>
        const input = document.getElementById('roomCode');
        const button = document.getElementById('btnEnter');

        function joinRoom() {
            const code = input.value.trim().replace(/[^a-zA-Z0-9-_]/g, ''); // Limpia caracteres raros
            if (code.length === 0) {
                alert("Por favor, escribe un código válido.");
                return;
            }
            // Redirige a index.html pasando la sala en la URL
            window.location.href = `lienzo.html?sala=${encodeURIComponent(code)}`;
        }

        button.addEventListener('click', joinRoom);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
